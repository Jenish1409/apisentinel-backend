spring.application.name=backend

server.port=${PORT:8080}

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.datasource.driver-class-name=org.postgresql.Driver

# CORS Configuration
apisentinel.cors.allowedOrigins=${APISENTINEL_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# JWT Configuration
# Hex encoded 256-bit secret key for HMAC-SHA256
apisentinel.app.jwtSecret=${APISENTINEL_APP_JWT_SECRET}
apisentinel.app.jwtExpirationMs=${APISENTINEL_APP_JWT_EXPIRATION_MS:86400000}

# Encryption Configuration
app.encryption.secret-key=${APP_ENCRYPTION_SECRET_KEY}

# Email Configuration (for Contact Us to jenishraichura58@gmail.com)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# The email that receives contact form submissions
apisentinel.mail.contact-target=${APISENTINEL_MAIL_CONTACT_TARGET}

# Logging Configuration
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
